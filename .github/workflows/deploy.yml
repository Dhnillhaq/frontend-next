name: Deploy to Vercel

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Update env var via Vercel API
        run: |
          # Hapus env lama
          ENV_ID=$(curl -s "https://api.vercel.com/v9/projects/${{ secrets.VERCEL_PROJECT_ID }}/env" \
            -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" \
            | jq -r '.envs[] | select(.key=="NEXT_PUBLIC_API_URL" and .target[]=="production") | .id')
          
          if [ -n "$ENV_ID" ]; then
            curl -s -X DELETE "https://api.vercel.com/v9/projects/${{ secrets.VERCEL_PROJECT_ID }}/env/$ENV_ID" \
              -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}"
          fi

          # Tambah env baru
          curl -s -X POST "https://api.vercel.com/v9/projects/${{ secrets.VERCEL_PROJECT_ID }}/env" \
            -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "key": "NEXT_PUBLIC_API_URL",
              "value": "${{ secrets.NEXT_PUBLIC_API_URL }}",
              "type": "plain",
              "target": ["production"]
            }'

      - name: Trigger Deploy Hook
        run: curl -X POST "${{ secrets.VERCEL_DEPLOY_HOOK_URL }}"